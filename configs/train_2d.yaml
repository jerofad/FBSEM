# ── PET Scanner ──────────────────────────────────────────────────────────────
scanner: mmr                    # 'mmr' (Siemens mMR) or 'mct' (Siemens mCT)
radial_bin_crop_factor: 0.5     # Radial bins kept = total * (1 - factor)
system_matrix_path: /path/to/system_matrix   # Directory containing system matrix files

# ── Training Data ─────────────────────────────────────────────────────────────
training_data_dir: /path/to/training_data    # Directory containing data-N.npy files
data_prefix: data-
num_train: 100                  # Total number of dataset files to use
is_3d: false

# ── Data Loading ──────────────────────────────────────────────────────────────
batch_size: 5
test_size: 0.2                  # Fraction held out as test set
valid_size: 0.1                 # Fraction of remaining used for validation
num_workers: 0                  # DataLoader worker processes (0 = main process)
crop_factor: 0.3                # Spatial crop fraction applied by the dataset loader
augment: true                   # Online augmentation for training: LR flip (50%) + MR intensity jitter

# ── Model Architecture ────────────────────────────────────────────────────────
depth: 5                        # Number of conv layers in ResUnit
num_kernels: 32                 # Convolutional feature maps
kernel_size: 3
in_channels: 2                  # 1 = PET only, 2 = PET + MR guidance
reg_cnn_model: resUnit

# ── Reconstruction (EM iterations inside the network) ─────────────────────────
psf_cm: 0.15                    # Point spread function FWHM in cm
niters: 8                       # EM iterations per forward pass
nsubs: 6                        # Number of OSEM subsets
mr_scale: 5                     # MR image scaling factor

# ── Training ──────────────────────────────────────────────────────────────────
lr: 0.01
epochs: 50
device: cpu                     # 'cpu', 'cuda', 'cuda:0', etc.
do_validation: true
loss_type: weighted_mse         # 'mse' or 'weighted_mse'
foreground_weight: 10.0         # Weight for foreground voxels (weighted_mse only)

# ── LR Scheduling ─────────────────────────────────────────────────────────────
lr_scheduler: plateau           # 'plateau' to use ReduceLROnPlateau, null to disable
lr_patience: 5                  # Epochs of no improvement before LR reduction
lr_factor: 0.5                  # Multiply LR by this on plateau
lr_min: 1.0e-6                  # Minimum LR floor

# ── Early Stopping ────────────────────────────────────────────────────────────
early_stop_patience: 15         # Stop after this many epochs without improvement (null to disable)

# ── Outputs ───────────────────────────────────────────────────────────────────
save_dir: /path/to/output/
model_name: fbsem-pm-01
save_from_epoch: 0              # Start saving checkpoints from this epoch (null = last only)
display: false
disp_figsize: [20, 10]
