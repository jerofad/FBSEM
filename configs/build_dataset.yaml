# ── PET Scanner ──────────────────────────────────────────────────────────────
scanner: mmr                    # 'mmr' (Siemens mMR) or 'mct' (Siemens mCT)
radial_bin_crop_factor: 0.5
system_matrix_path: /home/jeremiah/Datasets/PicoPET  # Directory containing system matrix files
is_3d: false

# ── Phantom Settings ──────────────────────────────────────────────────────────
phantom_type: brainweb          # Only 'brainweb' is currently supported
phantom_data_dir: /home/jeremiah/Datasets/PicoPET/brainweb_raws     # Directory with subject_XX.raws files
phantom_numbers: [0,1]           # null = all 20 subjects; or list e.g. [0,1,2,3,4]
num_rand_rotations: 5           # In-plane random rotations per phantom
rot_angle_degrees: 15           # Max rotation angle (±degrees)

# ── Simulation Parameters ─────────────────────────────────────────────────────
psf_hd_cm: 0.25                 # PSF FWHM for high-dose reconstruction (cm)
psf_ld_cm: 0.40                 # PSF FWHM for low-dose reconstruction (cm)
counts_hd: 1.0e+10              # HD sinogram count level
count_ld_window_2d: [1.0e+6, 1.0e+7]  # LD count range for 2D [min, max]
count_ld_window_3d: [9.0e+7, 1.2e+8]  # LD count range for 3D [min, max]
slices_2d: null                 # null = default (every 2nd slice, indices 65-85)

# ── Reconstruction Parameters ─────────────────────────────────────────────────
niter_hd: 15                    # OSEM iterations for HD ground-truth image
niter_ld: 10                    # OSEM iterations for LD network input
nsubs_hd: 14                    # OSEM subsets for HD reconstruction
nsubs_ld: 14                    # OSEM subsets for LD reconstruction

# ── Lesion Parameters ─────────────────────────────────────────────────────────
add_pet_lesion: true
add_t1_lesion: true
num_lesions: 15
lesion_size_mm: [2, 8]          # Diameter range [min, max] in mm
hot_cold_ratio: 0.6             # Fraction of lesions that are hot (vs cold)

# ── Output ────────────────────────────────────────────────────────────────────
save_training_dir: /home/jeremiah/Datasets/PicoPET/output   # Where data-N.npy files will be written
